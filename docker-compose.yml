services:
  app:
    build: .
    container_name: docker-monitor-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=docker_monitor
      - SESSION_SECRET=supersecret-prod-key
      # ── SMTP Email Alerts ──────────────────────────────────────────────────────
      # Configure these to enable container event email notifications.
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dockpulse-nt

  db:
    image: mysql:8
    container_name: docker-monitor-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=docker_monitor
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dockpulse-nt

networks:
  dockpulse-nt:
    driver: bridge
    name: dockpulse-nt

volumes:
  db_data:
